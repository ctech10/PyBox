<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PyBox</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
<style>
  :root {
    --bg: #fefaf4;
    --panel: #ffffff;
    --ink: #2b2b2b;
    --accent: #ff7a59;
    --accent-dark: #e85a36;
    --muted: #f1ede4;
    --border: #e4ddd0;
    --ok: #3fb27f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: -apple-system, "Comic Sans MS", "Segoe UI", sans-serif;
    background: var(--bg); color: var(--ink);
  }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 18px; background: var(--panel);
    border-bottom: 2px solid var(--border);
  }
  header h1 {
    margin: 0; font-size: 22px; color: var(--accent-dark);
  }
  #status { font-size: 13px; color: #888; }
  .toolbar { display: flex; gap: 8px; margin-left: auto; }
  button {
    font-family: inherit; font-size: 14px; font-weight: 600;
    padding: 9px 14px; border-radius: 11px; cursor: pointer;
    border: 2px solid var(--border); background: var(--muted); color: var(--ink);
    transition: transform .05s, background .15s;
  }
  button:hover { background: #e9e3d4; }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--accent); color: white; border-color: var(--accent-dark);
    font-size: 16px; padding: 10px 22px;
  }
  button.primary:hover { background: var(--accent-dark); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.example {
    padding: 7px 12px; font-size: 13px; border-radius: 999px;
    background: white;
  }
  .examples {
    display: flex; gap: 8px; padding: 10px 18px;
    background: var(--panel); border-bottom: 2px solid var(--border);
    overflow-x: auto;
  }
  .examples-label {
    font-weight: 700; font-size: 12px; color: #888;
    text-transform: uppercase; letter-spacing: 1px;
    align-self: center; padding-right: 4px; white-space: nowrap;
  }
  main {
    display: grid;
    height: calc(100% - 60px - 53px);
  }
  main.layout-bottom {
    grid-template-rows: 1fr 6px var(--results-h, 300px);
    grid-template-columns: 1fr;
  }
  main.layout-right {
    grid-template-columns: 1fr 6px var(--results-w, 460px);
    grid-template-rows: 1fr;
  }
  .editor-panel { display: flex; flex-direction: column; padding: 12px; min-height: 0; min-width: 0; }
  .editor-toolbar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .label {
    font-weight: 700; font-size: 12px; color: #666;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .editor-toolbar .label { margin-right: auto; }
  .CodeMirror {
    flex: 1; height: auto; border-radius: 12px;
    border: 2px solid var(--border);
    font-size: 16px; font-family: "SF Mono", Menlo, monospace;
    background: var(--panel);
  }
  .results-panel {
    display: grid; padding: 12px; gap: 12px; min-height: 0; min-width: 0;
  }
  main.layout-bottom .results-panel {
    grid-template-columns: 1fr 6px var(--output-w, 420px);
    grid-template-rows: 1fr;
  }
  main.layout-right .results-panel {
    grid-template-rows: var(--canvas-h, 420px) 6px 1fr;
    grid-template-columns: 1fr;
  }
  .output-wrap, .canvas-wrap { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  #output {
    flex: 1; background: #1e1e1e; color: #e8e8e8;
    border-radius: 12px; padding: 12px 14px; overflow: auto;
    font-family: "SF Mono", Menlo, monospace; font-size: 14px;
    white-space: pre-wrap; border: 2px solid var(--border);
    margin-top: 6px;
  }
  #output .err { color: #ff8a80; }
  #output .stdin-line { display: flex; align-items: center; }
  #output .stdin-prompt { color: #e8e8e8; white-space: pre-wrap; }
  #output .stdin-input {
    background: transparent; border: none; color: #8eff9f;
    font: inherit; outline: none; flex: 1;
    caret-color: #8eff9f; padding: 0;
  }
  .canvas-box {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: white; border: 2px solid var(--border); border-radius: 12px;
    margin-top: 6px; overflow: hidden;
  }
  #turtleCanvas { display: block; max-width: 100%; max-height: 100%; }

  main.hide-code .editor-panel { display: none; }
  main.hide-code #splitterMain { display: none; }
  main.hide-code.layout-bottom { grid-template-rows: 0 0 1fr; }
  main.hide-code.layout-right { grid-template-columns: 0 0 1fr; }
  main.hide-code .results-panel { border: none; }

  .splitter {
    background: var(--border);
    z-index: 5;
    user-select: none;
    transition: background 0.15s;
  }
  .splitter:hover, .splitter.dragging { background: var(--accent); }
  main.layout-bottom > #splitterMain { cursor: ns-resize; }
  main.layout-right > #splitterMain { cursor: ew-resize; }
  main.layout-bottom #splitterResults { cursor: ew-resize; }
  main.layout-right #splitterResults { cursor: ns-resize; }

  .panel {
    position: fixed; top: 70px; right: 18px;
    background: white; border: 2px solid var(--border);
    border-radius: 14px; padding: 14px 16px; width: 280px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100;
  }
  .panel.hidden { display: none; }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; font-weight: 700; font-size: 15px;
  }
  .panel-close {
    background: none; border: none; font-size: 18px; padding: 2px 8px;
    cursor: pointer; color: #888;
  }
  .panel-close:hover { background: var(--muted); }
  #projectsList { list-style: none; padding: 0; margin: 0; max-height: 320px; overflow: auto; }
  #projectsList li {
    display: flex; gap: 6px; margin-bottom: 6px;
  }
  #projectsList .proj-load {
    flex: 1; text-align: left; background: var(--muted);
    padding: 8px 12px; font-size: 14px;
  }
  #projectsList .proj-del {
    padding: 8px 12px; background: white; color: #c0392b;
  }
  #projectsList .proj-share {
    padding: 8px 12px; background: white;
  }
  .panel-empty {
    color: #888; text-align: center; padding: 20px 10px; font-size: 13px;
  }
  .panel-hint {
    font-size: 11px; color: #888; margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .menu-items { display: flex; flex-direction: column; gap: 6px; }
  .menu-items button {
    width: 100%; text-align: left; background: var(--muted);
    padding: 10px 14px;
  }
  .floating-controls {
    position: fixed; bottom: 24px; right: 24px;
    display: none; gap: 10px; z-index: 50;
    background: rgba(255, 255, 255, 0.95);
    padding: 10px; border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    border: 2px solid var(--border);
  }
  .floating-controls.show { display: flex; }
</style>
</head>
<body>

<script>
const EXAMPLES = {
  hello: `# Say hello
print("Hello!")
print("My name is Alice")
print("I am learning Python")
`,
  count: `# Count from 1 to 10
for i in range(1, 11):
    print(i)

print("Done!")
`,
  square: `# Draw a square with the turtle
import turtle

for i in range(4):
    turtle.forward(120)
    turtle.right(90)
`,
  spiral: `# Colorful spiral
import turtle

colors = ["red", "orange", "gold", "green", "blue", "purple"]
for i in range(70):
    turtle.pencolor(colors[i % 6])
    turtle.pensize(2)
    turtle.forward(i * 3)
    turtle.right(59)
`,
  flower: `# Pink flower
import turtle

turtle.pencolor("hotpink")
turtle.pensize(2)
for i in range(36):
    turtle.circle(70)
    turtle.right(10)
`,
  input: `# Ask the user questions and draw with the answers
import turtle

name = input("What's your name?")
print("Hello,", name + "!")

color = input("Pick a color (red, blue, green, purple):")
sides = int(input("How many sides? (3-10)"))

turtle.pencolor(color)
turtle.pensize(3)
for i in range(sides):
    turtle.forward(100)
    turtle.right(360 / sides)

print("Nice shape,", name + "!")
`,
  image: `# First click the 🖼 Image button and paste an image URL.
# Then run this code to draw on top of it.
import image
import turtle

# Show the image, scaled to 300x300, at the center
image.show(0, 0, 300, 300)

# Draw a red circle on top
turtle.pencolor("red")
turtle.pensize(4)
turtle.penup()
turtle.goto(0, -120)

print("Image size:", image.width(), "x", image.height())
`,
};

const TURTLE_PY = `
import sys, math, types
from js import document

_canvas = document.getElementById("turtleCanvas")
_ctx = _canvas.getContext("2d")

class _T:
    def __init__(self):
        self.x = 0.0; self.y = 0.0
        self.h = 0.0
        self.down = True
        self.color = "black"
        self.size = 2

    def _cx(self): return _canvas.width / 2 + self.x
    def _cy(self): return _canvas.height / 2 - self.y

    def fd(self, d):
        r = math.radians(self.h)
        nx = self.x + d * math.cos(r)
        ny = self.y + d * math.sin(r)
        if self.down:
            _ctx.beginPath()
            _ctx.strokeStyle = self.color
            _ctx.lineWidth = self.size
            _ctx.lineCap = "round"
            _ctx.moveTo(self._cx(), self._cy())
            self.x = nx; self.y = ny
            _ctx.lineTo(self._cx(), self._cy())
            _ctx.stroke()
        else:
            self.x = nx; self.y = ny

_t = _T()

def forward(d): _t.fd(d)
def fd(d): _t.fd(d)
def backward(d): _t.fd(-d)
def back(d): _t.fd(-d)
def bk(d): _t.fd(-d)
def right(a): _t.h -= a
def rt(a): _t.h -= a
def left(a): _t.h += a
def lt(a): _t.h += a
def penup(): _t.down = False
def pu(): _t.down = False
def pendown(): _t.down = True
def pd(): _t.down = True
def pencolor(c): _t.color = c
def color(c, *a): _t.color = c
def pensize(s): _t.size = s
def width(s): _t.size = s
def setheading(a): _t.h = a
def seth(a): _t.h = a

def goto(x, y):
    if _t.down:
        _ctx.beginPath()
        _ctx.strokeStyle = _t.color
        _ctx.lineWidth = _t.size
        _ctx.lineCap = "round"
        _ctx.moveTo(_t._cx(), _t._cy())
        _t.x = x; _t.y = y
        _ctx.lineTo(_t._cx(), _t._cy())
        _ctx.stroke()
    else:
        _t.x = x; _t.y = y

def setpos(x, y): goto(x, y)
def setposition(x, y): goto(x, y)

def home():
    goto(0, 0); _t.h = 0

def circle(r, extent=360):
    steps = max(12, int(abs(extent) / 3))
    step_a = extent / steps
    step_d = 2 * abs(r) * math.sin(math.radians(step_a / 2))
    if r < 0:
        for _ in range(steps):
            _t.fd(step_d); _t.h -= step_a
    else:
        for _ in range(steps):
            _t.fd(step_d); _t.h += step_a

def dot(size=4, c=None):
    cl = c or _t.color
    _ctx.beginPath()
    _ctx.fillStyle = cl
    _ctx.arc(_t._cx(), _t._cy(), size/2, 0, 2*math.pi)
    _ctx.fill()

def bgcolor(c):
    _canvas.style.backgroundColor = c

def clear():
    _ctx.clearRect(0, 0, _canvas.width, _canvas.height)

def reset():
    clear()
    _t.x = 0; _t.y = 0; _t.h = 0
    _t.down = True; _t.color = "black"; _t.size = 2
    _canvas.style.backgroundColor = "white"

def speed(s): pass
def done(): pass
def mainloop(): pass
def hideturtle(): pass
def showturtle(): pass
def title(t): pass

_mod = types.ModuleType("turtle")
_g = globals()
for _n in ["forward","fd","backward","back","bk","right","rt","left","lt",
           "penup","pu","pendown","pd","pencolor","color","pensize","width",
           "setheading","seth","goto","setpos","setposition","home","circle",
           "dot","bgcolor","clear","reset","speed","done","mainloop",
           "hideturtle","showturtle","title"]:
    setattr(_mod, _n, _g[_n])
sys.modules["turtle"] = _mod

# image module — uses the image loaded via the 🖼 Image button
import js

def _img_obj():
    img = js.window.pyboxGetImage()
    return img if img else None

def image_show(x=0, y=0, w=None, h=None):
    img = _img_obj()
    if img is None:
        print("No image. Open Menu → 🖼 Image from URL first.")
        return
    iw = img.naturalWidth
    ih = img.naturalHeight
    if w is None: w = iw
    if h is None: h = ih
    cx = _canvas.width / 2 + x - w / 2
    cy = _canvas.height / 2 - y - h / 2
    _ctx.drawImage(img, cx, cy, w, h)

def image_width():
    img = _img_obj()
    return img.naturalWidth if img else 0

def image_height():
    img = _img_obj()
    return img.naturalHeight if img else 0

def image_loaded():
    return _img_obj() is not None

_img_mod = types.ModuleType("image")
_img_mod.show = image_show
_img_mod.width = image_width
_img_mod.height = image_height
_img_mod.loaded = image_loaded
sys.modules["image"] = _img_mod

import ast

async def _pybox_ainput(prompt=""):
    p = js.window.pyboxPromptInput(str(prompt))
    r = await p
    return str(r) if r is not None else ""

class _InputTransformer(ast.NodeTransformer):
    def visit_Call(self, node):
        self.generic_visit(node)
        if isinstance(node.func, ast.Name) and node.func.id == "input":
            return ast.Await(value=ast.Call(
                func=ast.Name(id="_pybox_ainput", ctx=ast.Load()),
                args=node.args,
                keywords=node.keywords,
            ))
        return node

def _pybox_prepare(code):
    tree = ast.parse(code)
    _InputTransformer().visit(tree)
    ast.fix_missing_locations(tree)
    src = ast.unparse(tree)
    indented = "\\n".join("    " + line for line in src.split("\\n"))
    if not indented.strip():
        indented = "    pass"
    return "async def _pybox_main():\\n" + indented + "\\n"

def _pybox_reset():
    reset()
`;

const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
  mode: "python",
  theme: "eclipse",
  lineNumbers: true,
  indentUnit: 4,
  tabSize: 4,
  indentWithTabs: false,
  extraKeys: {
    "Tab": cm => cm.replaceSelection("    ", "end"),
    "Cmd-Enter": () => runCode(),
    "Ctrl-Enter": () => runCode(),
  },
});
editor.setValue(EXAMPLES.hello);

const outputEl = document.getElementById("output");
const statusEl = document.getElementById("status");
const runBtn = document.getElementById("runBtn");
const mainEl = document.getElementById("main");
const fileInput = document.getElementById("fileInput");
const floatingControls = document.getElementById("floatingControls");

function append(text, cls) {
  const span = document.createElement("span");
  if (cls) span.className = cls;
  span.textContent = text;
  outputEl.appendChild(span);
  outputEl.scrollTop = outputEl.scrollHeight;
}

let pyodide = null;

function setStatus(text, color) {
  statusEl.textContent = text;
  statusEl.style.color = color || "#888";
}

function showFatal(msg) {
  setStatus("⚠ " + msg, "#c0392b");
  outputEl.innerHTML = "";
  append("PyBox could not start.\n\n", "err");
  append(msg + "\n\n");
  append("Try:\n");
  append("  • Refresh the page (Cmd/Ctrl + Shift + R)\n");
  append("  • Check your internet connection\n");
  append("  • Try a different network (some schools block CDNs)\n");
  append("  • Use a modern browser (Chrome, Safari, Firefox, Edge)\n");
}

const PYODIDE_INDEX = "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/";

async function initPyodide() {
  const slowWarn = setTimeout(() => {
    if (!pyodide) setStatus("Still loading… (slow connection?)", "#c97a00");
  }, 25000);
  const hardTimeout = setTimeout(() => {
    if (!pyodide) showFatal("Loading Python timed out after 60 seconds. Try a hard refresh (Cmd/Ctrl + Shift + R).");
  }, 60000);

  try {
    if (typeof loadPyodide !== "function") {
      throw new Error("Pyodide script did not load. Check your internet connection.");
    }
    setStatus("Downloading Python… (~10 MB, first time only)");
    pyodide = await loadPyodide({ indexURL: PYODIDE_INDEX });
    clearTimeout(slowWarn);
    clearTimeout(hardTimeout);

    pyodide.setStdout({ batched: (s) => append(s + "\n") });
    pyodide.setStderr({ batched: (s) => append(s + "\n", "err") });

    setStatus("Setting up turtle…");
    await pyodide.runPythonAsync(TURTLE_PY);

    setStatus("Python ready ✓", "var(--ok)");
    runBtn.disabled = false;
  } catch (err) {
    clearTimeout(slowWarn);
    clearTimeout(hardTimeout);
    console.error("PyBox init failed:", err);
    const msg = String(err.message || err);
    if (msg.includes("exit(1)") || msg.includes("WebAssembly") || msg.includes("wasm")) {
      showFatal("Python failed to start. This usually means a cached file got corrupted. Please do a hard refresh: Cmd/Ctrl + Shift + R.");
    } else {
      showFatal("Error starting Python: " + msg);
    }
  }
}

initPyodide();

async function runCode() {
  if (!pyodide) return;
  outputEl.innerHTML = "";
  await pyodide.runPythonAsync("_pybox_reset()");
  try {
    pyodide.globals.set("_pybox_user_code", editor.getValue());
    await pyodide.runPythonAsync(
      "_w = _pybox_prepare(_pybox_user_code)\n" +
      "exec(_w, globals())\n" +
      "await _pybox_main()\n"
    );
  } catch (e) {
    append(String(e.message || e), "err");
  }
}

// Inline input inside the output console — used by Python's input()
window.pyboxPromptInput = (promptText) => {
  return new Promise((resolve) => {
    const line = document.createElement("div");
    line.className = "stdin-line";

    const promptSpan = document.createElement("span");
    promptSpan.className = "stdin-prompt";
    promptSpan.textContent = promptText;

    const inp = document.createElement("input");
    inp.className = "stdin-input";
    inp.type = "text";

    line.appendChild(promptSpan);
    line.appendChild(inp);
    outputEl.appendChild(line);
    outputEl.scrollTop = outputEl.scrollHeight;
    setTimeout(() => inp.focus(), 0);

    inp.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const val = inp.value;
        const finalLine = document.createElement("div");
        finalLine.textContent = promptText + val;
        outputEl.replaceChild(finalLine, line);
        outputEl.scrollTop = outputEl.scrollHeight;
        resolve(val);
      }
    });
  });
};

document.getElementById("runBtn").addEventListener("click", runCode);
document.getElementById("clearOutBtn").addEventListener("click", () => outputEl.innerHTML = "");

// Layout cycles: bottom → right → full (hide code) → bottom
const LAYOUTS = ["bottom", "right", "full"];
let layoutIdx = 0;

function applyLayout() {
  mainEl.classList.remove("layout-bottom", "layout-right", "hide-code");
  const l = LAYOUTS[layoutIdx];
  if (l === "bottom") mainEl.classList.add("layout-bottom");
  else if (l === "right") mainEl.classList.add("layout-right");
  else if (l === "full") mainEl.classList.add("layout-bottom", "hide-code");
  floatingControls.classList.toggle("show", l === "full");
  localStorage.setItem("pybox_layout_idx", String(layoutIdx));
  setTimeout(() => editor.refresh(), 50);
}

document.getElementById("layoutBtn").addEventListener("click", () => {
  layoutIdx = (layoutIdx + 1) % LAYOUTS.length;
  applyLayout();
});

// Splitter drag logic
function setupSplitter(splitterEl, getConfig) {
  splitterEl.addEventListener("mousedown", (e) => {
    const cfg = getConfig();
    if (!cfg) return;
    e.preventDefault();
    splitterEl.classList.add("dragging");
    const { axis, prop, defaultSize, invert } = cfg;
    const startPos = axis === "y" ? e.clientY : e.clientX;
    const current = parseFloat(mainEl.style.getPropertyValue(prop)) || defaultSize;

    function onMove(me) {
      const pos = axis === "y" ? me.clientY : me.clientX;
      let delta = pos - startPos;
      if (invert) delta = -delta;
      const newSize = Math.max(120, Math.min(window.innerWidth - 120, current + delta));
      mainEl.style.setProperty(prop, newSize + "px");
      editor.refresh();
    }
    function onUp() {
      splitterEl.classList.remove("dragging");
      localStorage.setItem("pybox_" + prop, mainEl.style.getPropertyValue(prop));
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    }
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
}

setupSplitter(document.getElementById("splitterMain"), () => {
  if (mainEl.classList.contains("hide-code")) return null;
  if (mainEl.classList.contains("layout-bottom")) {
    return { axis: "y", prop: "--results-h", defaultSize: 300, invert: true };
  } else {
    return { axis: "x", prop: "--results-w", defaultSize: 460, invert: true };
  }
});

setupSplitter(document.getElementById("splitterResults"), () => {
  if (mainEl.classList.contains("layout-bottom")) {
    return { axis: "x", prop: "--output-w", defaultSize: 420, invert: true };
  } else {
    return { axis: "y", prop: "--canvas-h", defaultSize: 420, invert: false };
  }
});

// ---------- Projects (saved in browser, each with a stable id) ----------
function genId() {
  return Math.random().toString(36).slice(2, 12);
}

function getProjects() {
  let data;
  try { data = JSON.parse(localStorage.getItem("pybox_projects") || "{}"); }
  catch { return {}; }
  // Migrate old format {name: code} -> {id: {name, code}}
  const keys = Object.keys(data);
  if (keys.length > 0 && typeof data[keys[0]] === "string") {
    const migrated = {};
    keys.forEach(name => { migrated[genId()] = { name, code: data[name] }; });
    localStorage.setItem("pybox_projects", JSON.stringify(migrated));
    return migrated;
  }
  return data;
}
function saveProjects(p) {
  localStorage.setItem("pybox_projects", JSON.stringify(p));
}
function findProjectIdByName(projects, name) {
  return Object.keys(projects).find(id => projects[id].name === name);
}
function flashStatus(msg) {
  const prev = statusEl.textContent;
  const prevColor = statusEl.style.color;
  setStatus(msg, "var(--ok)");
  setTimeout(() => { statusEl.textContent = prev; statusEl.style.color = prevColor; }, 1800);
}

document.getElementById("saveProjBtn").addEventListener("click", () => {
  const name = prompt("Project name:");
  if (!name) return;
  const trimmed = name.trim();
  if (!trimmed) return;
  const projects = getProjects();
  const existingId = findProjectIdByName(projects, trimmed);
  if (existingId && !confirm(`Overwrite "${trimmed}"?`)) return;
  const id = existingId || genId();
  projects[id] = { name: trimmed, code: editor.getValue() };
  saveProjects(projects);
  flashStatus(`Saved "${trimmed}" ✓`);
});

const projectsPanel = document.getElementById("projectsPanel");
const projectsList = document.getElementById("projectsList");
const projectsEmpty = document.getElementById("projectsEmpty");

function renderProjects() {
  const projects = getProjects();
  const entries = Object.entries(projects)
    .sort((a, b) => a[1].name.localeCompare(b[1].name));
  projectsList.innerHTML = "";
  if (entries.length === 0) {
    projectsEmpty.style.display = "block";
    return;
  }
  projectsEmpty.style.display = "none";
  entries.forEach(([id, proj]) => {
    const li = document.createElement("li");
    const load = document.createElement("button");
    load.className = "proj-load";
    load.textContent = proj.name;
    load.addEventListener("click", () => {
      editor.setValue(proj.code);
      projectsPanel.classList.add("hidden");
      flashStatus(`Loaded "${proj.name}" ✓`);
    });
    const share = document.createElement("button");
    share.className = "proj-share";
    share.textContent = "🔗";
    share.title = "Copy share link";
    share.addEventListener("click", async () => {
      const url = projectShareUrl(id, proj.name, proj.code);
      try {
        await navigator.clipboard.writeText(url);
        flashStatus(`Link for "${proj.name}" copied ✓`);
      } catch {
        prompt("Copy this link:", url);
      }
    });
    const del = document.createElement("button");
    del.className = "proj-del";
    del.textContent = "✕";
    del.title = "Delete";
    del.addEventListener("click", () => {
      if (!confirm(`Delete "${proj.name}"?`)) return;
      const p = getProjects();
      delete p[id];
      saveProjects(p);
      renderProjects();
    });
    li.appendChild(load);
    li.appendChild(share);
    li.appendChild(del);
    projectsList.appendChild(li);
  });
}

function projectShareUrl(id, name, code) {
  const payload = JSON.stringify({ i: id, n: name, c: code });
  return `${location.origin}${location.pathname}#s=${encodeCode(payload)}`;
}

document.getElementById("openProjBtn").addEventListener("click", () => {
  renderProjects();
  projectsPanel.classList.toggle("hidden");
});
document.getElementById("closeProjBtn").addEventListener("click", () => {
  projectsPanel.classList.add("hidden");
});

// ---------- Share via URL ----------
function encodeCode(code) {
  return btoa(unescape(encodeURIComponent(code)));
}
function decodeCode(s) {
  return decodeURIComponent(escape(atob(s)));
}

document.getElementById("shareBtn").addEventListener("click", async () => {
  const url = `${location.origin}${location.pathname}#p=${encodeCode(editor.getValue())}`;
  try {
    await navigator.clipboard.writeText(url);
    flashStatus("Share link copied ✓");
  } catch {
    prompt("Copy this share link:", url);
  }
});

function handleShareHash() {
  const hash = location.hash;
  if (hash.startsWith("#p=")) {
    try { editor.setValue(decodeCode(hash.slice(3))); }
    catch (e) { console.error("Bad share link", e); }
  } else if (hash.startsWith("#s=")) {
    try {
      const payload = JSON.parse(decodeCode(hash.slice(3)));
      const { i: id, n: name, c: code } = payload;
      editor.setValue(code);
      const projects = getProjects();
      if (!projects[id]) {
        setTimeout(() => {
          if (confirm(`Add shared project "${name}" to your projects?`)) {
            const p = getProjects();
            p[id] = { name, code };
            saveProjects(p);
            flashStatus(`Saved "${name}" to My Projects ✓`);
          }
        }, 400);
      } else {
        flashStatus(`Loaded "${name}"`);
      }
    } catch (e) { console.error("Bad share link", e); }
  }
}
handleShareHash();

// ---------- Image from URL (usable in Python via `import image`) ----------
let pyboxImage = null;
window.pyboxGetImage = () => pyboxImage;

const imageBtn = document.getElementById("imageBtn");

function loadImageUrl(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Could not load image"));
    img.src = url;
  });
}

imageBtn.addEventListener("click", async () => {
  if (pyboxImage) {
    const action = confirm("Remove the current image?\n(Cancel to change URL)");
    if (action) {
      pyboxImage = null;
      imageBtn.textContent = "🖼 Image";
      flashStatus("Image removed");
      return;
    }
  }
  const current = pyboxImage ? pyboxImage.src : "https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/280px-PNG_transparency_demonstration_1.png";
  const url = prompt("Image URL:", current);
  if (!url) return;
  try {
    pyboxImage = await loadImageUrl(url.trim());
    imageBtn.textContent = "🖼 Image ×";
    flashStatus("Image loaded ✓");
  } catch (e) {
    pyboxImage = null;
    flashStatus("Could not load image");
  }
});
